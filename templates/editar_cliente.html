{% extends "layout.html" %}

{% block content %}

<h2>Editar Cliente</h2>

<form method="POST">

<div class="mb-3">
<label>Nome</label>
<input type="text" name="nome" class="form-control" value="{{cliente[1]}}">
</div>

<div class="mb-3">
<label>Telefone</label>
<input type="text" name="telefone" class="form-control" value="{{cliente[2]}}">
</div>

<div class="mb-3">
<label>Email</label>
<input type="text" name="email" class="form-control" value="{{cliente[3]}}">
</div>

<button type="submit" class="btn btn-success">
Salvar
</button>

</form>

{% endblock %}
